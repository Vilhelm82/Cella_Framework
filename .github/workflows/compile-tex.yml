name: Build LaTeX PDF

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install TeX Live packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            latexmk texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended texlive-fonts-extra

      - name: Build PDF with latexmk
        run: |
          set -e
          latexmk -pdf -interaction=nonstopmode paper/lead7_kn_n3_dbp_metric.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: lead7_kn_n3_dbp_metric-pdf
          path: paper/lead7_kn_n3_dbp_metric.pdf
